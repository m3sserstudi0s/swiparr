# Auto-Merge Workflow for Dependabot PRs
name: Auto-Merge Dependabot PRs

on:
  pull_request:
    branches: [develop]

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    
    steps:
      - name: Auto-merge Dependabot PR
        run: |
          # Add a comment to the PR
          gh pr comment $PR_NUMBER -b "🤖 Auto-merging this Dependabot update to keep dependencies current."
          
          # Merge the PR
          gh pr merge $PR_NUMBER --auto --squash
          
          # Delete the branch if it's from Dependabot
          if [[ "$HEAD_REF" == dependabot/* ]]; then
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$HEAD_REF"
          fi
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
