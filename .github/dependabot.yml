# Dependabot Configuration for Swiparr
version: 2
updates:
  # Maintain dependencies for npm (package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    ignore:
      - "eslint"                       # Already well-maintained
      - "typescript"                   # Stable major version
      - "webpack"                      # Stable major version
    target-branch: "develop"
    versioning-strategy: increase
    allow:
      - dependency-type: "direct"
    check-branch-convention: "none"
    commit-message:
      include: "scope"
      
  # Maintain dependencies for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    target-branch: "develop"
    versioning-strategy: increase
    allow:
      - dependency-type: "all"
    check-branch-convention: "none"
    commit-message:
      include: "scope"
      
  # Security updates (critical vulnerabilities)
  - package-ecosystem: "npm"
    directory: "/"
    security-updates: true
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 5
    target-branch: "develop"
    allow:
      - dependency-type: "direct"
    check-branch-convention: "none"
    commit-message:
      include: "scope"
